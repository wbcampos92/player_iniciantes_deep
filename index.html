<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Iniciantes IASD Foz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a1628;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .app {
            max-width: 780px;
            width: 100%;
            background: linear-gradient(160deg, #0f1f33, #152b40);
            border-radius: 28px;
            padding: 20px 16px 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 0 1px rgba(212, 175, 55, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.25);
        }
        .header {
            text-align: center;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 2px solid rgba(212, 175, 55, 0.2);
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: #d4af37;
            text-shadow: 0 2px 15px rgba(212, 175, 55, 0.15);
            letter-spacing: 0.5px;
        }
        .header h1 small {
            font-size: 0.6rem;
            font-weight: 400;
            color: #b8cfe0;
            display: block;
            margin-top: 4px;
            letter-spacing: 2px;
        }
        .header .sub {
            color: #8aadc7;
            font-size: 0.8rem;
            margin-top: 2px;
            letter-spacing: 1px;
        }
        .player-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            border: 1px solid rgba(212, 175, 55, 0.15);
        }
        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 14px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .controls .now-playing {
            color: #b8cfe0;
            font-size: 0.85rem;
            flex: 1;
            min-width: 120px;
        }
        .controls .now-playing strong {
            color: #d4af37;
            font-weight: 600;
        }
        .controls .btn-shuffle {
            background: rgba(212, 175, 55, 0.12);
            border: 1px solid rgba(212, 175, 55, 0.25);
            color: #d4af37;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .controls .btn-shuffle:hover {
            background: rgba(212, 175, 55, 0.25);
            transform: scale(1.02);
        }
        .playlist-section {
            margin-top: 18px;
        }
        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #8aadc7;
            padding: 0 4px 10px 4px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
        }
        .playlist-header span:first-child {
            color: #d4af37;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .playlist-header .count {
            background: rgba(212, 175, 55, 0.12);
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #d4af37;
        }
        .playlist-scroll {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 8px;
            padding-right: 4px;
            scrollbar-width: thin;
            scrollbar-color: #d4af37 transparent;
        }
        .playlist-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .playlist-scroll::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 10px;
        }
        .playlist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            margin-bottom: 4px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            border: 1px solid transparent;
            color: #b0c8da;
        }
        .playlist-item:hover {
            background: rgba(212, 175, 55, 0.06);
            border-color: rgba(212, 175, 55, 0.1);
        }
        .playlist-item.active {
            background: rgba(212, 175, 55, 0.12);
            border-color: rgba(212, 175, 55, 0.3);
        }
        .playlist-item.active .idx {
            background: #d4af37;
            color: #0a1628;
            font-weight: 700;
        }
        .playlist-item.active .title {
            color: #fff;
        }
        .idx {
            min-width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            font-size: 0.7rem;
            font-weight: 600;
            color: #6a8ba3;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .title {
            font-size: 0.9rem;
            line-height: 1.3;
            flex: 1;
            word-break: break-word;
        }
        .duration {
            font-size: 0.7rem;
            color: #5a7a92;
            flex-shrink: 0;
            background: rgba(0,0,0,0.2);
            padding: 2px 10px;
            border-radius: 20px;
        }
        .loading {
            text-align: center;
            padding: 30px 0;
            color: #5a7a92;
            font-size: 0.9rem;
        }
        .loading .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-top: 3px solid #d4af37;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            color: rgba(255,255,255,0.15);
            font-size: 0.65rem;
            letter-spacing: 1px;
            border-top: 1px solid rgba(255,255,255,0.04);
            padding-top: 16px;
        }
        .footer strong {
            color: rgba(212, 175, 55, 0.4);
            font-weight: 400;
        }
        @media (max-width: 480px) {
            .app { padding: 14px 10px 18px; }
            .header h1 { font-size: 1.4rem; }
            .playlist-item { padding: 8px 10px; }
            .title { font-size: 0.8rem; }
            .controls .now-playing { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <h1>🎵 Iniciantes <small>IASD Foz</small></h1>
        <div class="sub">3° Trimestre · Playlist Oficial</div>
    </div>

    <div class="player-wrapper">
        <iframe id="player" src="https://www.youtube.com/embed/videoseries?list=PL9uRnOcPI3e0GisU6e4SY3vw62EzrUmDF&autoplay=0&rel=0" allowfullscreen></iframe>
    </div>

    <div class="controls">
        <div class="now-playing">🎶 <strong id="nowPlaying">Carregando...</strong></div>
        <button class="btn-shuffle" id="shuffleBtn">🔀 Aleatório</button>
    </div>

    <div class="playlist-section">
        <div class="playlist-header">
            <span>📋 Lista de Músicas</span>
            <span class="count" id="videoCount">Carregando...</span>
        </div>
        <div class="playlist-scroll" id="playlistContainer">
            <div class="loading"><div class="spinner"></div>Buscando vídeos...</div>
        </div>
    </div>

    <div class="footer"><strong>♫ Iniciantes IASD Foz</strong> · Todos os direitos reservados</div>
</div>

<script>
// ============================================================
// CONFIGURAÇÕES
// ============================================================
const PLAYLIST_ID = 'PL9uRnOcPI3e0GisU6e4SY3vw62EzrUmDF';
const PROXY_URL = 'https://api.allorigins.win/raw?url='; // Proxy CORS gratuito

// ============================================================
// ELEMENTOS DOM
// ============================================================
const player = document.getElementById('player');
const playlistContainer = document.getElementById('playlistContainer');
const nowPlaying = document.getElementById('nowPlaying');
const shuffleBtn = document.getElementById('shuffleBtn');
const videoCount = document.getElementById('videoCount');

// ============================================================
// ESTADO
// ============================================================
let videoList = [];          // Array com { id, title }
let currentIndex = 0;
let shuffled = false;
let currentList = [];        // Lista atualmente exibida (normal ou shuffle)

// ============================================================
// FUNÇÃO: Buscar vídeos via feed RSS (com proxy CORS)
// ============================================================
async function fetchPlaylistFromRSS() {
    try {
        const rssUrl = `https://www.youtube.com/feeds/videos.xml?playlist_id=${PLAYLIST_ID}`;
        const response = await fetch(PROXY_URL + encodeURIComponent(rssUrl));
        if (!response.ok) throw new Error('Erro ao buscar feed');

        const text = await response.text();
        const parser = new DOMParser();
        const xml = parser.parseFromString(text, 'text/xml');

        // Verifica se houve erro de parsing
        if (xml.querySelector('parsererror')) throw new Error('Erro no XML');

        const entries = xml.querySelectorAll('entry');
        const items = [];
        entries.forEach(entry => {
            const id = entry.querySelector('yt\\:videoId, videoId')?.textContent?.trim();
            const title = entry.querySelector('title')?.textContent?.trim();
            if (id && title) {
                items.push({ id, title });
            }
        });

        if (items.length === 0) throw new Error('Nenhum vídeo encontrado');
        return items;
    } catch (error) {
        console.warn('Falha no RSS, usando fallback:', error);
        return null; // Fallback será acionado
    }
}

// ============================================================
// FALLBACK: Usar a playlist com índices (títulos genéricos)
// ============================================================
function getFallbackList() {
    // Cria 14 itens com títulos genéricos
    const titles = [
        'Abertura', 'Louvor 1', 'Louvor 2', 'Louvor 3', 'Louvor 4',
        'Louvor 5', 'Louvor 6', 'Louvor 7', 'Louvor 8', 'Louvor 9',
        'Louvor 10', 'Louvor 11', 'Louvor 12', 'Encerramento'
    ];
    return titles.map((title, i) => ({
        id: null, // sem ID individual
        title: `${i+1}. ${title}`
    }));
}

// ============================================================
// CARREGAR VÍDEO (individual ou por índice)
// ============================================================
function loadVideo(index) {
    const list = shuffled ? currentList : videoList; // usa a lista atual
    if (!list || index >= list.length) return;

    const video = list[index];
    currentIndex = index;

    if (video.id) {
        // Tem ID individual → carrega o vídeo específico
        player.src = `https://www.youtube.com/embed/${video.id}?autoplay=1&rel=0`;
    } else {
        // Fallback: usa a playlist com índice (0-based)
        player.src = `https://www.youtube.com/embed/videoseries?list=${PLAYLIST_ID}&index=${index}&autoplay=1&rel=0`;
    }

    nowPlaying.textContent = video.title || `Música ${index+1}`;

    // Destaca o item ativo
    document.querySelectorAll('.playlist-item').forEach((el, i) => {
        el.classList.toggle('active', i === index);
    });

    // Salva no localStorage
    try {
        localStorage.setItem('iasd_last', JSON.stringify({ index, video }));
    } catch(e) {}
}

// ============================================================
// RENDERIZAR LISTA
// ============================================================
function renderList(items) {
    playlistContainer.innerHTML = '';
    if (!items || items.length === 0) {
        playlistContainer.innerHTML = '<div style="color:#5a7a92; padding:20px; text-align:center;">Nenhum vídeo disponível</div>';
        videoCount.textContent = '0 vídeos';
        return;
    }

    videoCount.textContent = `${items.length} vídeos`;

    items.forEach((video, index) => {
        const div = document.createElement('div');
        div.className = 'playlist-item';
        if (index === currentIndex) div.classList.add('active');

        div.innerHTML = `
            <span class="idx">${index + 1}</span>
            <span class="title">${video.title || `Vídeo ${index+1}`}</span>
            <span class="duration">▶</span>
        `;

        div.addEventListener('click', () => {
            // Se a lista atual é embaralhada, precisamos encontrar o índice correto na lista original?
            // Mas loadVideo usa o índice da lista atual, então ok.
            loadVideo(index);
        });

        playlistContainer.appendChild(div);
    });
}

// ============================================================
// INICIALIZAÇÃO
// ============================================================
async function init() {
    // Tenta buscar do RSS
    let items = await fetchPlaylistFromRSS();

    // Se falhou, usa fallback
    if (!items) {
        items = getFallbackList();
    }

    videoList = items;
    currentList = [...videoList]; // cópia

    // Restaura última música
    let startIndex = 0;
    try {
        const saved = localStorage.getItem('iasd_last');
        if (saved) {
            const data = JSON.parse(saved);
            const found = videoList.findIndex(v => v.id === data.video?.id);
            if (found !== -1) startIndex = found;
        }
    } catch(e) {}

    renderList(currentList);
    loadVideo(startIndex);
}

// ============================================================
// EMBARALHAR
// ============================================================
function shuffleArray(arr) {
    const copy = [...arr];
    for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
}

function toggleShuffle() {
    shuffled = !shuffled;
    shuffleBtn.textContent = shuffled ? '🔀 Aleatório ON' : '🔀 Aleatório';

    if (shuffled) {
        currentList = shuffleArray(videoList);
    } else {
        currentList = [...videoList];
    }

    // Ajusta o índice atual para o mesmo vídeo (se possível)
    const currentVideo = videoList[currentIndex];
    if (currentVideo) {
        const newIndex = currentList.findIndex(v => v.id === currentVideo.id);
        if (newIndex !== -1) {
            currentIndex = newIndex;
        } else {
            currentIndex = 0;
        }
    } else {
        currentIndex = 0;
    }

    renderList(currentList);
    // Recarrega o vídeo atual com o novo índice
    loadVideo(currentIndex);
}

// ============================================================
// EVENTOS
// ============================================================
shuffleBtn.addEventListener('click', toggleShuffle);

// ============================================================
// INICIAR
// ============================================================
init();
console.log('🎵 Player Iniciantes IASD Foz carregado!');
</script>
</body>
</html>
