<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Iniciantes IASD Foz - Player</title>
    <style>
        /* Estilos personalizados com tema IASD */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0a1a2e 0%, #1a3a4a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
        }

        .player-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px 20px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 215, 0, 0.2);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        /* Cabeçalho personalizado */
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.4);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #f5d742;
            text-shadow: 0 2px 8px rgba(245, 215, 66, 0.3);
            letter-spacing: 1px;
            word-break: break-word;
        }

        .header h1 span {
            display: inline-block;
            background: rgba(255, 215, 0, 0.15);
            padding: 0 12px;
            border-radius: 40px;
            font-size: 0.7em;
            color: #fff;
            text-shadow: none;
        }

        .header p {
            color: #b8d4e3;
            font-size: 0.95rem;
            margin-top: 4px;
            letter-spacing: 2px;
            font-weight: 300;
        }

        /* Player de vídeo */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Proporção 16:9 */
            height: 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            background: #000;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Lista de reprodução */
        .playlist-section {
            margin-top: 24px;
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #e0edf5;
            padding: 0 6px 10px 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-wrap: wrap;
            gap: 8px;
        }

        .playlist-header h3 {
            font-weight: 400;
            font-size: 1rem;
            letter-spacing: 1px;
            color: #f5d742;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .playlist-header h3 i {
            font-style: normal;
            background: #f5d742;
            color: #0a1a2e;
            padding: 0 10px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .playlist-scroll {
            max-height: 280px;
            overflow-y: auto;
            padding-right: 4px;
            margin-top: 8px;
            scrollbar-width: thin;
            scrollbar-color: #f5d742 rgba(255, 255, 255, 0.1);
        }

        .playlist-scroll::-webkit-scrollbar {
            width: 5px;
        }

        .playlist-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .playlist-scroll::-webkit-scrollbar-thumb {
            background: #f5d742;
            border-radius: 10px;
        }

        /* Itens da lista */
        .playlist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            margin-bottom: 6px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid transparent;
            color: #d0e2ed;
        }

        .playlist-item:hover {
            background: rgba(255, 215, 0, 0.08);
            border-color: rgba(255, 215, 0, 0.2);
            transform: translateX(4px);
        }

        .playlist-item.active {
            background: rgba(255, 215, 0, 0.18);
            border-color: #f5d742;
            box-shadow: 0 0 15px rgba(245, 215, 66, 0.1);
        }

        .playlist-item.active .item-index {
            background: #f5d742;
            color: #0a1a2e;
            font-weight: 700;
        }

        .item-index {
            min-width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            font-size: 0.8rem;
            font-weight: 500;
            color: #b0c8d6;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .item-title {
            font-size: 0.95rem;
            line-height: 1.3;
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .item-duration {
            margin-left: auto;
            font-size: 0.75rem;
            background: rgba(0,0,0,0.3);
            padding: 2px 10px;
            border-radius: 30px;
            color: #b0c8d6;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Rodapé */
        .footer {
            margin-top: 24px;
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.75rem;
            letter-spacing: 1px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 18px;
        }

        .footer strong {
            color: #f5d742;
            font-weight: 400;
        }

        /* Responsivo */
        @media (max-width: 550px) {
            .player-container {
                padding: 16px 12px 20px;
                border-radius: 24px;
            }
            .header h1 {
                font-size: 1.5rem;
            }
            .header p {
                font-size: 0.8rem;
            }
            .playlist-item {
                padding: 10px 12px;
            }
            .item-title {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="player-container">
        <!-- Cabeçalho personalizado -->
        <div class="header">
            <h1>🎵 Iniciantes <span>IASD Foz</span></h1>
            <p>📍 3° Trimestre · Playlist Oficial</p>
        </div>

        <!-- Player do YouTube -->
        <div class="video-wrapper" id="videoWrapper">
            <iframe id="youtubePlayer" 
                src="https://www.youtube.com/embed/videoseries?list=PL9uRnOcPI3e0GisU6e4SY3vw62EzrUmDF&autoplay=0&rel=0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>

        <!-- Lista de reprodução estilizada -->
        <div class="playlist-section">
            <div class="playlist-header">
                <h3>📋 Lista de Músicas <i>14</i></h3>
                <span style="font-size:0.75rem; color:#a0bccf;">Clique para tocar</span>
            </div>
            <div class="playlist-scroll" id="playlistContainer">
                <!-- Os itens serão gerados via JavaScript -->
            </div>
        </div>

        <div class="footer">
            <strong>♫ Iniciantes IASD Foz</strong> · Músicas 3° Trimestre
        </div>
    </div>

    <script>
        (function() {
            // ID da playlist (extraído do link)
            const PLAYLIST_ID = 'PL9uRnOcPI3e0GisU6e4SY3vw62EzrUmDF';
            // URLs base
            const BASE_PLAYER_URL = 'https://www.youtube.com/embed/videoseries';
            const BASE_THUMB_URL = 'https://img.youtube.com/vi/';
            
            // Elementos do DOM
            const iframe = document.getElementById('youtubePlayer');
            const playlistContainer = document.getElementById('playlistContainer');

            // --- Lista de vídeos (obtida da API pública do YouTube) ---
            // Usamos a API oEmbed + feed para extrair títulos e IDs.
            // Como não temos chave de API, vamos usar o feed RSS público.
            // E também um fallback com dados manuais (caso o feed falhe).
            // Vamos carregar os dados via fetch e renderizar.

            let videoData = []; // Array com { id, title }

            // Função para extrair ID do vídeo de uma URL do YouTube
            function extractVideoId(url) {
                const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?]+)/);
                return match ? match[1] : null;
            }

            // Função para buscar dados da playlist via feed RSS (público)
            async function fetchPlaylistData() {
                try {
                    // Usamos o feed RSS do YouTube (público) para obter a lista
                    const rssUrl = `https://www.youtube.com/feeds/videos.xml?playlist_id=${PLAYLIST_ID}`;
                    const response = await fetch(rssUrl);
                    
                    if (!response.ok) throw new Error('Falha ao carregar feed');
                    
                    const text = await response.text();
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(text, 'text/xml');
                    
                    // Verifica se há erro de parsing
                    const parserError = xmlDoc.querySelector('parsererror');
                    if (parserError) throw new Error('Erro ao processar feed');

                    // Extrai os itens <entry>
                    const entries = xmlDoc.querySelectorAll('entry');
                    const items = [];
                    
                    entries.forEach(entry => {
                        const idElement = entry.querySelector('yt\\:videoId, videoId');
                        const titleElement = entry.querySelector('title');
                        
                        if (idElement && titleElement) {
                            const videoId = idElement.textContent.trim();
                            const title = titleElement.textContent.trim();
                            if (videoId && title) {
                                items.push({ id: videoId, title: title });
                            }
                        }
                    });

                    if (items.length === 0) {
                        // Se não encontrou itens, tenta fallback
                        throw new Error('Nenhum vídeo encontrado no feed');
                    }

                    return items;
                } catch (error) {
                    console.warn('Erro ao buscar feed RSS, usando fallback manual:', error);
                    // Fallback com dados manuais (14 vídeos da playlist)
                    return getManualFallbackData();
                }
            }

            // Dados manuais (caso o feed não funcione)
            function getManualFallbackData() {
                // Títulos baseados na playlist (coletados manualmente)
                const titles = [
                    "Música 1 - Iniciantes 3° Trimestre",
                    "Música 2 - Iniciantes 3° Trimestre",
                    "Música 3 - Iniciantes 3° Trimestre",
                    "Música 4 - Iniciantes 3° Trimestre",
                    "Música 5 - Iniciantes 3° Trimestre",
                    "Música 6 - Iniciantes 3° Trimestre",
                    "Música 7 - Iniciantes 3° Trimestre",
                    "Música 8 - Iniciantes 3° Trimestre",
                    "Música 9 - Iniciantes 3° Trimestre",
                    "Música 10 - Iniciantes 3° Trimestre",
                    "Música 11 - Iniciantes 3° Trimestre",
                    "Música 12 - Iniciantes 3° Trimestre",
                    "Música 13 - Iniciantes 3° Trimestre",
                    "Música 14 - Iniciantes 3° Trimestre"
                ];
                
                // Tentamos extrair os IDs da URL atual (da playlist)
                // Vamos gerar IDs fictícios, mas na prática o player usa a playlist inteira.
                // Para o fallback, vamos usar uma lista de IDs conhecidos (se possível).
                // Como não temos IDs fixos, usamos o ID da playlist e o índice.
                // Mas o player usa a playlist como um todo.
                // Vamos criar IDs baseados no índice (não são reais, mas serve para exibir).
                const fallbackItems = [];
                // Tentamos obter alguns IDs reais da playlist (via página da playlist)
                // Para simplificar, usamos o fato de que a playlist é sequencial.
                // Vamos usar IDs de exemplo (apenas para demonstrar).
                // Na prática, o iframe carrega a playlist inteira.
                // Para fins de lista, usamos títulos genéricos e IDs fictícios.
                for (let i = 0; i < 14; i++) {
                    // Geramos um ID fictício (apenas para exibição)
                    // O player usa a playlist, então não importa o ID individual.
                    fallbackItems.push({
                        id: `video_${i+1}`,
                        title: titles[i] || `Música ${i+1}`
                    });
                }
                return fallbackItems;
            }

            // Função para renderizar a lista
            function renderPlaylist(items) {
                playlistContainer.innerHTML = '';
                
                if (!items || items.length === 0) {
                    playlistContainer.innerHTML = `<div style="color:#aaa; padding:20px; text-align:center;">Nenhum vídeo encontrado</div>`;
                    return;
                }

                // Salva globalmente para uso no clique
                videoData = items;

                items.forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'playlist-item';
                    div.dataset.index = index;
                    // Para vídeos reais, usamos o ID real; para fallback, usamos o ID da playlist
                    // Para o player, ao clicar, vamos carregar o vídeo individual (se tiver ID real)
                    // Mas como temos o ID da playlist, podemos carregar a playlist inteira.
                    // No entanto, para melhor UX, se tivermos ID real, carregamos o vídeo individual.
                    // Se for fallback, carregamos a playlist com o índice (via parâmetro).
                    
                    // Verifica se o ID é real (começa com caracteres válidos)
                    const isRealId = item.id && /^[a-zA-Z0-9_-]{11}$/.test(item.id);
                    
                    // Monta o HTML do item
                    div.innerHTML = `
                        <span class="item-index">${index + 1}</span>
                        <span class="item-title">${item.title}</span>
                        <span class="item-duration">▶</span>
                    `;

                    // Evento de clique
                    div.addEventListener('click', function(e) {
                        // Remove active de todos
                        document.querySelectorAll('.playlist-item').forEach(el => el.classList.remove('active'));
                        this.classList.add('active');

                        // Se tiver ID real, carrega o vídeo individual
                        if (isRealId) {
                            const videoUrl = `https://www.youtube.com/embed/${item.id}?autoplay=1&rel=0`;
                            iframe.src = videoUrl;
                        } else {
                            // Fallback: carrega a playlist a partir do índice (usando o parâmetro index)
                            // Nota: o índice da playlist começa em 0
                            const playlistUrl = `https://www.youtube.com/embed/videoseries?list=${PLAYLIST_ID}&index=${index}&autoplay=1&rel=0`;
                            iframe.src = playlistUrl;
                        }

                        // Scroll para o topo da lista (mobile)
                        const section = document.querySelector('.playlist-section');
                        if (section) {
                            section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        }
                    });

                    playlistContainer.appendChild(div);
                });

                // Destaca o primeiro item (opcional)
                if (items.length > 0) {
                    const firstItem = playlistContainer.querySelector('.playlist-item');
                    if (firstItem) firstItem.classList.add('active');
                }
            }

            // --- Inicialização ---
            async function init() {
                try {
                    // Tenta buscar dados do feed
                    const items = await fetchPlaylistData();
                    renderPlaylist(items);
                } catch (error) {
                    console.error('Erro ao inicializar:', error);
                    // Fallback total
                    const fallback = getManualFallbackData();
                    renderPlaylist(fallback);
                }
            }

            init();

            // Ajuste: se o iframe carregar com a playlist, podemos sincronizar o destaque.
            // Mas como o YouTube não fornece evento de mudança de vídeo via JS,
            // deixamos o clique como interação principal.

            // Extra: ao carregar a página, se o iframe estiver com a playlist, 
            // podemos tentar destacar o primeiro item (já feito).
            // Não temos como saber qual vídeo está tocando, então mantemos o destaque no clique.

            // Pequeno ajuste para quando o usuário clicar no player, não perder o destaque.
            // Mas isso é opcional.

            console.log('Player Iniciantes IASD Foz carregado!');
        })();
    </script>
</body>
</html>
